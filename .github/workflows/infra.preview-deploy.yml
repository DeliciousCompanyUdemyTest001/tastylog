name: "infra preview & deploy"

on:
  push:
    branches:
      - main
    paths:
      - 15_infra-test/**
      - .github/workflows/**
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: 1.14.6

defaults:
  run:
    shell: bash
    working-directory: "15_infra-test/"

jobs:
  preview:
    name: "Preview"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup terraform
        uses: hashicorp/setup-terraform@v4
        with: 
          terraform_version: ${{ env.TF_VERSION}}
      - name: Terraform format
        run: |
          terraform fmt -check